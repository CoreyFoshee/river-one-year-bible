<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="The River Church — Daily Bible Reading (NIV)" />
    <title>Daily Bible Reading | The River Church</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="page">
      <main class="main main--embed">
        <header class="page-header">
          <h1 class="page-header__title">Daily Bible Reading</h1>
        </header>

        <section class="toolbar card">
          <div class="toolbar__row">
            <label class="field field--date">
              <span class="field__label">Date</span>
              <div class="field__date-wrap">
                <input type="date" id="date-input" class="field__input" autocomplete="off" />
                <button
                  type="button"
                  class="field__calendar-btn"
                  id="btn-open-calendar"
                  aria-label="Open calendar"
                  title="Choose date"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="22"
                    height="22"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                  </svg>
                </button>
              </div>
            </label>
            <div class="toolbar__actions">
              <button type="button" class="btn btn--ghost" id="btn-prev" aria-label="Previous day">← Prev</button>
              <button type="button" class="btn btn--ghost" id="btn-today">Today</button>
              <button type="button" class="btn btn--ghost" id="btn-next" aria-label="Next day">Next →</button>
            </div>
          </div>
          <p class="toolbar__hint" id="day-label"></p>
        </section>

        <div id="status" class="status" hidden></div>

        <div id="sections" class="sections"></div>

        <footer class="foot">
          <p class="foot__legal" id="copyright-block"></p>
          <p class="foot__meta">
            Scripture from API.Bible (NIV). This tool follows API.Bible terms of use.
            <a href="https://theriver.cc" target="_blank" rel="noopener noreferrer">theriver.cc</a>
          </p>
        </footer>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
